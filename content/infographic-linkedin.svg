<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a"/>
      <stop offset="100%" style="stop-color:#252545"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f54e00"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c9a7"/>
      <stop offset="100%" style="stop-color:#00e5c0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="180" fill="#f54e00" opacity="0.05"/>
  <circle cx="100" cy="550" r="150" fill="#00c9a7" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accentGrad)"/>

  <!-- Logo / Title area -->
  <text x="60" y="80" font-size="42" font-weight="800" fill="white">🦔 selfhog</text>
  <text x="60" y="112" font-size="16" fill="#888" letter-spacing="3">POSTHOG SELF-HOSTING · SOLVED</text>

  <!-- Main headline -->
  <text x="60" y="175" font-size="32" font-weight="700" fill="white">12 Hours of Debugging.</text>
  <text x="60" y="215" font-size="32" font-weight="700" fill="url(#accentGrad)">One Command to Fix It All.</text>

  <!-- Divider -->
  <rect x="60" y="235" width="80" height="3" fill="url(#accentGrad)" rx="2"/>

  <!-- Problem cards — left column -->
  <!-- Card 1 -->
  <rect x="60" y="265" width="340" height="72" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="265" width="4" height="72" rx="2" fill="#f54e00"/>
  <text x="80" y="295" font-size="13" fill="#f54e00" font-weight="700">PLUGINS: FALSE</text>
  <text x="80" y="318" font-size="12" fill="#aaa">Django checks a Kubernetes URL by default.</text>
  <text x="80" y="333" font-size="12" fill="#aaa">Set CDP_API_URL=http://posthog_plugins:6738</text>

  <!-- Card 2 -->
  <rect x="60" y="350" width="340" height="72" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="350" width="4" height="72" rx="2" fill="#f54e00"/>
  <text x="80" y="380" font-size="13" fill="#f54e00" font-weight="700">NODE.JS CRASH LOOP</text>
  <text x="80" y="403" font-size="12" fill="#aaa">Wrong image runs missing code.</text>
  <text x="80" y="418" font-size="12" fill="#aaa">Override command → skip the worker.</text>

  <!-- Card 3 -->
  <rect x="60" y="435" width="340" height="72" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="435" width="4" height="72" rx="2" fill="#f54e00"/>
  <text x="80" y="465" font-size="13" fill="#f54e00" font-weight="700">ENCRYPTION KEY REJECTED</text>
  <text x="80" y="488" font-size="12" fill="#aaa">Must be 32 raw UTF-8 chars, not base64.</text>
  <text x="80" y="503" font-size="12" fill="#aaa">Use: openssl rand -hex 16</text>

  <!-- Problem cards — middle column -->
  <!-- Card 4 -->
  <rect x="430" y="265" width="340" height="72" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="430" y="265" width="4" height="72" rx="2" fill="#f54e00"/>
  <text x="450" y="295" font-size="13" fill="#f54e00" font-weight="700">POSTGRES FAILS ON REBOOT</text>
  <text x="450" y="318" font-size="12" fill="#aaa">Static IP stolen by another container.</text>
  <text x="450" y="333" font-size="12" fill="#aaa">Remove ipv4_address, use Docker DNS.</text>

  <!-- Card 5 -->
  <rect x="430" y="350" width="340" height="72" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="430" y="350" width="4" height="72" rx="2" fill="#f54e00"/>
  <text x="450" y="380" font-size="13" fill="#f54e00" font-weight="700">CELERY: FALSE</text>
  <text x="450" y="403" font-size="12" fill="#aaa">Beat scheduler crash + Redis lock not freed.</text>
  <text x="450" y="418" font-size="12" fill="#aaa">docker exec -d ... celery beat</text>

  <!-- Card 6 -->
  <rect x="430" y="435" width="340" height="72" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="430" y="435" width="4" height="72" rx="2" fill="#f54e00"/>
  <text x="450" y="465" font-size="13" fill="#f54e00" font-weight="700">NGINX 502 AFTER RECREATE</text>
  <text x="450" y="488" font-size="12" fill="#aaa">Container gets new IP, Nginx caches old one.</text>
  <text x="450" y="503" font-size="12" fill="#aaa">Fix: nginx -s reload</text>

  <!-- Right panel — CTA -->
  <rect x="800" y="255" width="340" height="295" rx="16" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="800" y="255" width="340" height="4" rx="2" fill="url(#accentGrad)"/>

  <text x="970" y="308" font-size="40" text-anchor="middle">🦔</text>
  <text x="970" y="348" font-size="24" font-weight="800" fill="white" text-anchor="middle">npx selfhog</text>
  <text x="970" y="374" font-size="13" fill="#888" text-anchor="middle">Installs 2 Claude Code slash commands</text>

  <!-- Command pills -->
  <rect x="840" y="392" width="260" height="36" rx="18" fill="#1a3a2a"/>
  <text x="970" y="415" font-size="13" fill="#00c9a7" text-anchor="middle" font-weight="700">/deploy-posthog</text>

  <rect x="840" y="440" width="260" height="36" rx="18" fill="#1a3a2a"/>
  <text x="970" y="463" font-size="13" fill="#00c9a7" text-anchor="middle" font-weight="700">/posthog-health</text>

  <!-- Divider -->
  <rect x="840" y="492" width="260" height="1" fill="#333"/>

  <!-- Stats -->
  <text x="860" y="518" font-size="12" fill="#666">📦</text>
  <text x="878" y="518" font-size="12" fill="#888">npmjs.com/package/selfhog</text>
  <text x="860" y="536" font-size="12" fill="#666">⭐</text>
  <text x="878" y="536" font-size="12" fill="#888">github.com/Ismail-Mirza/selfhog</text>

  <!-- Footer -->
  <rect x="0" y="590" width="1200" height="38" fill="#111"/>
  <text x="60" y="614" font-size="13" fill="#555">Mohammad Ismail</text>
  <text x="200" y="614" font-size="13" fill="#333">·</text>
  <text x="220" y="614" font-size="13" fill="#555">ismail.me.buet@gmail.com</text>
  <text x="420" y="614" font-size="13" fill="#333">·</text>
  <text x="440" y="614" font-size="13" fill="#555">linkedin.com/in/ismail-mirza</text>
  <text x="700" y="614" font-size="13" fill="#333">·</text>
  <text x="720" y="614" font-size="13" fill="#555">facebook.com/ismail.buet</text>

  <!-- Boot time bar -->
  <text x="60" y="565" font-size="12" fill="#555">FIRST BOOT:</text>
  <rect x="160" y="552" width="580" height="14" rx="7" fill="#1a1a2e"/>
  <rect x="160" y="552" width="50" height="14" rx="7" fill="#2d4a3e"/>
  <rect x="210" y="552" width="80" height="14" rx="0" fill="#2d5a3e"/>
  <rect x="290" y="552" width="180" height="14" rx="0" fill="#2d6a3e"/>
  <rect x="470" y="552" width="270" height="14" rx="0" fill="url(#greenGrad)" opacity="0.8"/>
  <text x="165" y="563" font-size="9" fill="#aaa">30s</text>
  <text x="215" y="563" font-size="9" fill="#aaa">1min</text>
  <text x="295" y="563" font-size="9" fill="#aaa">5min</text>
  <text x="475" y="563" font-size="9" fill="#aaa">8min</text>
  <text x="700" y="563" font-size="9" fill="#00e5c0" font-weight="700">✓ Ready ~12min</text>
</svg>
