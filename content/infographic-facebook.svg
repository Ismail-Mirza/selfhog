<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f54e00"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c9a7"/>
      <stop offset="100%" style="stop-color:#00e5c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg2)"/>

  <!-- Decorative blobs -->
  <circle cx="1050" cy="150" r="300" fill="#f54e00" opacity="0.04"/>
  <circle cx="150" cy="1050" r="250" fill="#00c9a7" opacity="0.05"/>
  <circle cx="600" cy="600" r="500" fill="#ffffff" opacity="0.01"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#orange)"/>

  <!-- Hero section -->
  <text x="600" y="100" font-size="72" text-anchor="middle">🦔</text>
  <text x="600" y="165" font-size="52" font-weight="900" fill="white" text-anchor="middle">selfhog</text>
  <text x="600" y="205" font-size="18" fill="#666" text-anchor="middle" letter-spacing="4">SELF-HOST POSTHOG WITHOUT THE PAIN</text>

  <!-- Headline -->
  <rect x="200" y="225" width="800" height="2" fill="#222"/>
  <text x="600" y="285" font-size="34" font-weight="800" fill="white" text-anchor="middle">6 Traps. 1 Command. 0 Headaches.</text>

  <!-- Problem → Fix grid -->
  <!-- Row headers -->
  <rect x="60" y="315" width="520" height="44" rx="10" fill="#1e1e30"/>
  <text x="320" y="344" font-size="16" font-weight="700" fill="#f54e00" text-anchor="middle" letter-spacing="2">THE TRAPS</text>

  <rect x="620" y="315" width="520" height="44" rx="10" fill="#1a2e28"/>
  <text x="880" y="344" font-size="16" font-weight="700" fill="#00c9a7" text-anchor="middle" letter-spacing="2">THE FIXES</text>

  <!-- Row 1 -->
  <rect x="60" y="372" width="520" height="60" rx="8" fill="#1a1a2e" stroke="#f54e00" stroke-width="1" stroke-opacity="0.3"/>
  <text x="90" y="397" font-size="13" fill="#f54e00" font-weight="700">❌  plugins: false</text>
  <text x="90" y="420" font-size="12" fill="#888">Django checks a Kubernetes URL by default</text>

  <rect x="620" y="372" width="520" height="60" rx="8" fill="#1a2e1e" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="650" y="397" font-size="13" fill="#00c9a7" font-weight="700">✅  CDP_API_URL env var</text>
  <text x="650" y="420" font-size="12" fill="#888">CDP_API_URL=http://posthog_plugins:6738</text>

  <!-- Row 2 -->
  <rect x="60" y="446" width="520" height="60" rx="8" fill="#1a1a2e" stroke="#f54e00" stroke-width="1" stroke-opacity="0.3"/>
  <text x="90" y="471" font-size="13" fill="#f54e00" font-weight="700">❌  Node.js crash every 2s</text>
  <text x="90" y="494" font-size="12" fill="#888">Wrong image tries to run missing code</text>

  <rect x="620" y="446" width="520" height="60" rx="8" fill="#1a2e1e" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="650" y="471" font-size="13" fill="#00c9a7" font-weight="700">✅  Override command</text>
  <text x="650" y="494" font-size="12" fill="#888">./bin/migrate &amp;&amp; ./bin/docker-server</text>

  <!-- Row 3 -->
  <rect x="60" y="520" width="520" height="60" rx="8" fill="#1a1a2e" stroke="#f54e00" stroke-width="1" stroke-opacity="0.3"/>
  <text x="90" y="545" font-size="13" fill="#f54e00" font-weight="700">❌  Fernet key rejected</text>
  <text x="90" y="568" font-size="12" fill="#888">ENCRYPTION_SALT_KEYS format trap</text>

  <rect x="620" y="520" width="520" height="60" rx="8" fill="#1a2e1e" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="650" y="545" font-size="13" fill="#00c9a7" font-weight="700">✅  32 raw UTF-8 chars</text>
  <text x="650" y="568" font-size="12" fill="#888">openssl rand -hex 16</text>

  <!-- Row 4 -->
  <rect x="60" y="594" width="520" height="60" rx="8" fill="#1a1a2e" stroke="#f54e00" stroke-width="1" stroke-opacity="0.3"/>
  <text x="90" y="619" font-size="13" fill="#f54e00" font-weight="700">❌  Postgres fails on reboot</text>
  <text x="90" y="642" font-size="12" fill="#888">Static IP stolen by another container</text>

  <rect x="620" y="594" width="520" height="60" rx="8" fill="#1a2e1e" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="650" y="619" font-size="13" fill="#00c9a7" font-weight="700">✅  Remove ipv4_address</text>
  <text x="650" y="642" font-size="12" fill="#888">Use Docker DNS — no static IPs</text>

  <!-- Row 5 -->
  <rect x="60" y="668" width="520" height="60" rx="8" fill="#1a1a2e" stroke="#f54e00" stroke-width="1" stroke-opacity="0.3"/>
  <text x="90" y="693" font-size="13" fill="#f54e00" font-weight="700">❌  celery: false</text>
  <text x="90" y="716" font-size="12" fill="#888">Beat scheduler crash + Redis lock held</text>

  <rect x="620" y="668" width="520" height="60" rx="8" fill="#1a2e1e" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="650" y="693" font-size="13" fill="#00c9a7" font-weight="700">✅  docker exec -d ... celery beat</text>
  <text x="650" y="716" font-size="12" fill="#888">Wait 60s for redbeat lock TTL</text>

  <!-- Row 6 -->
  <rect x="60" y="742" width="520" height="60" rx="8" fill="#1a1a2e" stroke="#f54e00" stroke-width="1" stroke-opacity="0.3"/>
  <text x="90" y="767" font-size="13" fill="#f54e00" font-weight="700">❌  Nginx 502 after recreate</text>
  <text x="90" y="790" font-size="12" fill="#888">Container gets new IP, Nginx caches old one</text>

  <rect x="620" y="742" width="520" height="60" rx="8" fill="#1a2e1e" stroke="#00c9a7" stroke-width="1" stroke-opacity="0.3"/>
  <text x="650" y="767" font-size="13" fill="#00c9a7" font-weight="700">✅  nginx -s reload</text>
  <text x="650" y="790" font-size="12" fill="#888">Re-resolves DNS without downtime</text>

  <!-- CTA section -->
  <rect x="60" y="830" width="1080" height="240" rx="20" fill="#141428" filter="url(#shadow2)"/>
  <rect x="60" y="830" width="1080" height="5" rx="3" fill="url(#orange)"/>

  <text x="600" y="895" font-size="22" fill="#888" text-anchor="middle">All of this is encoded in one command</text>

  <!-- Big command -->
  <rect x="350" y="915" width="500" height="64" rx="32" fill="#0d0d1f" stroke="#f54e00" stroke-width="2"/>
  <text x="600" y="956" font-size="30" font-weight="900" fill="url(#orange)" text-anchor="middle">npx selfhog</text>

  <!-- Two pills -->
  <rect x="160" y="1000" width="370" height="44" rx="22" fill="#1a2e28"/>
  <text x="345" y="1028" font-size="16" fill="#00c9a7" text-anchor="middle" font-weight="700">/deploy-posthog</text>

  <rect x="670" y="1000" width="370" height="44" rx="22" fill="#1a2e28"/>
  <text x="855" y="1028" font-size="16" fill="#00c9a7" text-anchor="middle" font-weight="700">/posthog-health</text>

  <!-- Footer -->
  <rect x="0" y="1148" width="1200" height="52" fill="#0a0a14"/>
  <text x="600" y="1180" font-size="14" fill="#444" text-anchor="middle">Mohammad Ismail  ·  github.com/Ismail-Mirza/selfhog  ·  npmjs.com/package/selfhog</text>
</svg>
